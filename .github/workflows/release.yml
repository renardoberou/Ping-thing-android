name: release

on:
  push:
    tags: ['v*']

permissions:
  contents: write   # required to create the GitHub Release

jobs:
  signed-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'

      - name: Decode keystore from secrets
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_B64 }}
        run: |
          if [ -z "$KEYSTORE_B64" ]; then
            echo "::error::KEYSTORE_B64 secret is missing — follow docs/RELEASE.md §1 first."
            exit 1
          fi
          echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/release.jks"

      - name: Derive version name from tag
        run: echo "VERSION_NAME=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Build signed APK + AAB
        working-directory: android
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASS }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASS }}
        run: gradle assembleRelease bundleRelease

      - name: Stage release assets
        run: |
          cp android/app/build/outputs/apk/release/app-release.apk "ping-thing-${GITHUB_REF_NAME}.apk"
          cp android/app/build/outputs/bundle/release/app-release.aab "ping-thing-${GITHUB_REF_NAME}.aab"

      - name: Verify signature and generate checksums
        run: |
          SDK_ROOT="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          APKSIGNER=$(find "$SDK_ROOT/build-tools" -maxdepth 2 -name apksigner 2>/dev/null | sort -V | tail -1)
          if [ -z "$APKSIGNER" ]; then
            echo "::error::apksigner not found under $SDK_ROOT/build-tools — cannot verify the release signature."
            exit 1
          fi
          echo "Using $APKSIGNER"
          "$APKSIGNER" verify --verbose "ping-thing-${GITHUB_REF_NAME}.apk"
          sha256sum ping-thing-*.apk ping-thing-*.aab | tee CHECKSUMS.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ping-thing-*.apk
            ping-thing-*.aab
            CHECKSUMS.txt
          body: |
            Signed release. Verify the APK signature yourself before installing:
            `apksigner verify --verbose ping-thing-*.apk` — matches the check this
            workflow already ran. SHA-256 checksums are in `CHECKSUMS.txt`.
          generate_release_notes: true
          fail_on_unmatched_files: true
